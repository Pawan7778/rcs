AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128

Resources:
  # STEP 1: We COMMENT OUT the API Gateway to force a "Clean Slate"
  # RestApi:
  #   Type: AWS::Serverless::Api
  #   Properties:
  #     StageName: Prod
  #     Name: rcs_main
  #     Cors:
  #       AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
  #       AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
  #       AllowOrigin: "'*'"

  RcsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: id
        Type: String

  RcsBucket:
    Type: AWS::S3::Bucket

  HelloWorldFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_helloWorld
      CodeUri: src/
      Handler: handlers/rcs_helloworld.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          TABLE_NAME: !Ref RcsTable
          BUCKET_NAME: !Ref RcsBucket
      # STEP 1: We COMMENT OUT the Event trigger so it doesn't look for the RestApi
      # Events:
      #   HelloWorldApi:
      #     Type: Api
      #     Properties:
      #       Path: /hello
      #       Method: get
      #       RestApiId: !Ref RestApi
