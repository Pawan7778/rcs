AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

# -----------------------------------------------------------------------
# GLOBALS: Default settings applied to ALL functions in this template.
# -----------------------------------------------------------------------
Globals:
  Function:
    Runtime: nodejs22.x # CAN CHANGE: Use nodejs18.x or nodejs20.x if needed.
    Timeout: 10 # CAN CHANGE: Increase if your logic takes longer.
    MemorySize: 128 # CAN CHANGE: Increase for memory-heavy tasks.

Resources:
  # -----------------------------------------------------------------------
  # API GATEWAY: This is the "Container" for your endpoints.
  # -----------------------------------------------------------------------
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod # CAN CHANGE: e.g., 'Dev' or 'Staging'.
      Name: rcs_main # CAN CHANGE: This is the API name shown in the Console.
      EndpointConfiguration:
        Type: REGIONAL
      Auth:
        DefaultAuthorizer: RcsCustomAuthorizer
        Authorizers:
          RcsCustomAuthorizer:
            FunctionPayloadType: TOKEN
            FunctionArn: !GetAtt RcsAuthorizerFn.Arn
            Identity:
              Header: Authorization
            AuthorizerResultTtlInSeconds: 0
      Cors: # DONT CHANGE: These settings allow browser access.
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"
  # -----------------------------------------------------------------------
  # DYNAMODB: Your database table.
  # -----------------------------------------------------------------------

  RcsUserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rcs_user
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
        - AttributeName: userType
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: UserTypeIndex
          KeySchema:
            - AttributeName: userType
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  RcsBrandBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - "*"
            MaxAge: 3000

  RcsBrandBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref RcsBrandBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: 
              - "s3:GetObject"
            Resource: !Sub "${RcsBrandBucket.Arn}/*"

  RcsBrandTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rcs_brandManagement
      AttributeDefinitions:
        - AttributeName: brandName
          AttributeType: S
      KeySchema:
        - AttributeName: brandName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST



  RcsBotTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rcs_bot
      AttributeDefinitions:
        - AttributeName: botName
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: botName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: BotGlobalIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  RcsTemplateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rcs_template
      AttributeDefinitions:
        - AttributeName: templateName
          AttributeType: S
        - AttributeName: botName
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: templateName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: BotStatusIndex
          KeySchema:
            - AttributeName: botName
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # -----------------------------------------------------------------------
  # LAMBDA FUNCTION: The "Logic" of your project.
  # -----------------------------------------------------------------------
  HelloWorldFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_helloWorld # CAN CHANGE: The name in the Lambda console.
      CodeUri: src/ # DONT CHANGE: Must match your folder name.
      Handler: handlers/rcs_helloworld.handler # DONT CHANGE: Must match filename.function.

      # IAM ROLE: Since you are using a manual role, keep this ARN updated.
      Role: arn:aws:iam::521769331492:role/rcs_role

      # ENVIRONMENT VARIABLES: Passes Resource names into your Node.js code.
      Environment:
        Variables:
          TABLE_NAME: RcsTable # DONT CHANGE: Link to DynamoDB above.
          BUCKET_NAME: RcsBucket # DONT CHANGE: Link to S3 above.

      # API EVENTS: Defines the URL path and HTTP method.
      Events:
        HelloWorldApi:
          Type: Api
          Properties:
            Path: /hello # CAN CHANGE: Your URL will be .../hello
            Method: get # CAN CHANGE: get, post, put, etc.
            RestApiId: !Ref RestApi # DONT CHANGE: Connects this path to 'rcs_main'.

  RcsAuthorizerFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_authorizer
      CodeUri: src/
      Handler: handlers/rcs_authorizer.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          JWT_SECRET: "zFI8KSAJ8mlenxzhxkOWmuk9bOvrJX8oouxfSDdekpG" # REPLACE in production
          SETUP_SECRET_KEY: "my_super_secret_setup_key_123"

  RcsSignupFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_signup
      CodeUri: src/
      Handler: handlers/rcs_signup.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          USER_TABLE: !Ref RcsUserTable
          JWT_SECRET: "zFI8KSAJ8mlenxzhxkOWmuk9bOvrJX8oouxfSDdekpG"
          SETUP_SECRET_KEY: "my_super_secret_setup_key_123"
      Events:
        SignupApi:
          Type: Api
          Properties:
            Path: /signup
            Method: post
            RestApiId: !Ref RestApi
            Auth:
              Authorizer: RcsCustomAuthorizer

  RcsUserLoginFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_userLogin
      CodeUri: src/
      Handler: handlers/rcs_userLogin.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          USER_TABLE: !Ref RcsUserTable
          JWT_SECRET: "zFI8KSAJ8mlenxzhxkOWmuk9bOvrJX8oouxfSDdekpG"
      Events:
        LoginUserApi:
          Type: Api
          Properties:
            Path: /login/user
            Method: post
            RestApiId: !Ref RestApi
            Auth:
              Authorizer: NONE

  RcsAdminLoginFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_adminLogin
      CodeUri: src/
      Handler: handlers/rcs_adminLogin.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          USER_TABLE: !Ref RcsUserTable
          JWT_SECRET: "zFI8KSAJ8mlenxzhxkOWmuk9bOvrJX8oouxfSDdekpG"
      Events:
        LoginAdminApi:
          Type: Api
          Properties:
            Path: /login/admin
            Method: post
            RestApiId: !Ref RestApi
            Auth:
              Authorizer: NONE

  RcsGetUserFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_getUser
      CodeUri: src/
      Handler: handlers/rcs_getUser.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          USER_TABLE: !Ref RcsUserTable
      Events:
        GetUserApi:
          Type: Api
          Properties:
            Path: /users
            Method: get
            RestApiId: !Ref RestApi
            Auth:
              Authorizer: RcsCustomAuthorizer

  RcsCreateBrandFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_createBrand
      CodeUri: src/
      Handler: handlers/rcs_createBrand.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          USER_TABLE: !Ref RcsUserTable
          BRAND_TABLE: !Ref RcsBrandTable
          BRAND_BUCKET: !Ref RcsBrandBucket
          BOT_TABLE: !Ref RcsBotTable
      Events:
        CreateBrandApi:
          Type: Api
          Properties:
            Path: /brand
            Method: post
            RestApiId: !Ref RestApi
            Auth:
              Authorizer: RcsCustomAuthorizer

  RcsGetBrandFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_getBrand
      CodeUri: src/
      Handler: handlers/rcs_getBrand.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          BRAND_TABLE: !Ref RcsBrandTable
          BOT_TABLE: !Ref RcsBotTable
          USER_TABLE: !Ref RcsUserTable
      Events:
        GetBrandApi:
          Type: Api
          Properties:
            Path: /brand
            Method: get
            RestApiId: !Ref RestApi
            Auth:
              Authorizer: RcsCustomAuthorizer

  RcsTemplateBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - "*"
            MaxAge: 3000

  RcsTemplateBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref RcsTemplateBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: 
              - "s3:GetObject"
            Resource: !Sub "${RcsTemplateBucket.Arn}/*"

  RcsCreateTemplateFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_createTemplate
      CodeUri: src/
      Handler: handlers/rcs_createTemplate.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          TEMPLATE_TABLE: !Ref RcsTemplateTable
          TEMPLATE_BUCKET: !Ref RcsTemplateBucket
      Events:
        CreateTemplateApi:
          Type: Api
          Properties:
            Path: /template
            Method: post
            RestApiId: !Ref RestApi
            Auth:
              Authorizer: RcsCustomAuthorizer

  RcsGetTemplateFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_getTemplate
      CodeUri: src/
      Handler: handlers/rcs_getTemplate.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          TEMPLATE_TABLE: !Ref RcsTemplateTable
      Events:
        GetTemplateApi:
          Type: Api
          Properties:
            Path: /template
            Method: get
            RestApiId: !Ref RestApi
            Auth:
              Authorizer: RcsCustomAuthorizer

  RcsUpdateTemplateStatusFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rcs_updateTemplateStatus
      CodeUri: src/
      Handler: handlers/rcs_updateTemplateStatus.handler
      Role: arn:aws:iam::521769331492:role/rcs_role
      Environment:
        Variables:
          TEMPLATE_TABLE: !Ref RcsTemplateTable
          USER_TABLE: !Ref RcsUserTable
      Events:
        UpdateTemplateStatusApi:
          Type: Api
          Properties:
            Path: /template/status
            Method: put
            RestApiId: !Ref RestApi
            Auth:
              Authorizer: RcsCustomAuthorizer
